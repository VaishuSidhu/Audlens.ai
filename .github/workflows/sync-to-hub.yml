name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Clean Sync
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "vaishusidhu@gmail.com"
          git config --global user.name "VaishuSidhu"
          
          # Create a temp folder outside the workspace
          TEMP_DIR=$(mktemp -d)
          cp -r $GITHUB_WORKSPACE/* $TEMP_DIR/
          cd $TEMP_DIR
          
          # Remove heavy folders and git history
          rm -rf .git
          rm -rf model/data
          rm -rf node_modules
          
          # Initialize as 'main' and push
          git init
          git checkout -b main
          git add .
          git commit -m "Production Deployment"
          
          # Force push to Hugging Face
          git remote add hf https://x-token:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Vaishusid/Audlens
          git push --force hf main
