name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # The new 'hf' tool is pre-installed on the runner
          # We use it to upload the current directory to the Space
          # We ignore the data folder to keep it light
          hf upload Vaishusid/Audlens . . --repo-type space --token $HF_TOKEN --exclude "model/data/*" "node_modules/*" ".git/*"
