name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Use the official CLI to upload only the necessary folders
          # We skip 'model/data' by just not including it in the upload list
          huggingface-cli upload Vaishusid/Audlens . . --repo-type=space --token=$HF_TOKEN --exclude "model/data/*" "node_modules/*" ".git/*"
