name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Clean Sync
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup Git
          git config --global user.email "vaishusidhu@gmail.com"
          git config --global user.name "VaishuSidhu"
          
          # 2. Create a fresh temporary directory for the clean version
          mkdir clean_repo
          cp -r . clean_repo/
          cd clean_repo
          
          # 3. Remove the heavy data and git history
          rm -rf .git
          rm -rf model/data
          rm -rf node_modules
          
          # 4. Initialize a brand new git repo and push
          git init
          git add .
          git commit -m "Deployment Sync"
          git remote add hf https://x-token:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Vaishusid/Audlens
          git push --force hf master:main
