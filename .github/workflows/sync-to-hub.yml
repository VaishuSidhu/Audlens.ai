name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "vaishusidhu@gmail.com"
          git config --global user.name "VaishuSidhu"
          
          # Create a temporary clean branch without the data folder
          git checkout --orphan temp_sync
          git rm -r --cached model/data || true
          git commit -m "Clean deployment for HF"
          
          git remote add hf https://x-token:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Vaishusid/Audlens
          git push --force hf temp_sync:main
