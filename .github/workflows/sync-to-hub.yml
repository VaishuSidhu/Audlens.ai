name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Clean Sync
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup Identity
          git config --global user.email "vaishusidhu@gmail.com"
          git config --global user.name "VaishuSidhu"
          git config --global init.defaultBranch main
          
          # 2. Create a clean temporary directory
          TEMP_DIR=$(mktemp -d)
          cp -r $GITHUB_WORKSPACE/* $TEMP_DIR/
          cd $TEMP_DIR
          
          # 3. Strip out everything we don't want to upload
          rm -rf .git
          rm -rf model/data
          rm -rf node_modules
          
          # 4. Create a fresh project specifically named 'main'
          git init
          git checkout -b main
          git add .
          git commit -m "Official Production Build"
          
          # 5. Push to Hugging Face
          git remote add hf https://x-token:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Vaishusid/Audlens
          git push --force hf main
